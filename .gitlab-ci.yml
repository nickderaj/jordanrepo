default:
  image: node:20-alpine
  before_script:
    - corepack enable
    - corepack prepare pnpm@8.15.6 --activate
    - pnpm config set store-dir .pnpm-store
    - pnpm install --frozen-lockfile
  cache:
    key:
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store

stages:
  - check

format:
  stage: check
  script:
    - pnpm format:check

lint:
  stage: check
  script:
    - pnpm lint
